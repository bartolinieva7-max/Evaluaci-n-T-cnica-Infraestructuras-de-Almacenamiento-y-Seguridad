<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Evaluación: Almacenamiento y Seguridad</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #e0f0ff 0%, #f0e6ff 50%, #ffe0f0 100%);
            font-family: 'Segoe UI', 'Roboto', 'Poppins', system-ui, sans-serif;
            padding: 1rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quiz-wrapper {
            max-width: 780px;
            width: 100%;
            margin: 0 auto;
            background: #ffffffdd;
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            transition: all 0.2s;
        }

        .header {
            text-align: center;
            margin-bottom: 1.2rem;
            border-bottom: 4px solid #3a86ff;
            padding-bottom: 0.7rem;
        }

        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #1e6f9f, #e67e22);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.2px;
        }

        .sub {
            color: #e67e22;
            font-size: 0.85rem;
            margin-top: 0.2rem;
            font-weight: 600;
        }

        .progress-area {
            background: #e6e0f0;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: #1a4a6e;
            font-weight: 700;
        }

        .question-counter {
            font-weight: 800;
            background: #ffcc88;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            color: #5a3a1a;
        }

        .score-badge {
            background: #88ccaa;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-weight: 700;
            color: #1a4a2e;
        }

        .question-card {
            background: #ffffff;
            border-radius: 1.5rem;
            padding: 1.3rem;
            margin-bottom: 1.2rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border-left: 8px solid #3a86ff;
            border-right: 1px solid #d0e0f0;
        }

        .question-text {
            font-size: 1.08rem;
            font-weight: 800;
            color: #2c3e66;
            margin-bottom: 1.2rem;
            line-height: 1.4;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .option {
            display: flex;
            align-items: flex-start;
            gap: 0.8rem;
            cursor: pointer;
            padding: 0.6rem 0.8rem;
            border-radius: 1rem;
            background: #fefaf5;
            border: 2px solid #e0d0c0;
            transition: all 0.15s;
        }

        .option:hover {
            background: #fff4e6;
            border-color: #e6b87e;
            transform: scale(1.01);
        }

        input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 1.2rem;
            height: 1.2rem;
            border: 2px solid #e67e22;
            border-radius: 50%;
            margin-top: 0.1rem;
            cursor: pointer;
            background: white;
            flex-shrink: 0;
        }

        input[type="radio"]:checked {
            background-color: #e67e22;
            border-color: #e67e22;
            box-shadow: inset 0 0 0 3px white;
        }

        .option label {
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.4;
            cursor: pointer;
            color: #2c3e66;
            font-weight: 600;
        }

        .feedback {
            margin-top: 0.8rem;
            padding: 0.7rem 1rem;
            border-radius: 1rem;
            font-size: 0.85rem;
            background: #fef7e8;
            border-left: 5px solid;
            line-height: 1.4;
            color: #2c3e50;
        }

        .feedback.correct {
            border-left-color: #44aa66;
            background: #e0ffe8;
        }

        .feedback.incorrect {
            border-left-color: #ff6666;
            background: #ffe6e6;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn {
            border: none;
            background: #ddd0c0;
            color: #4a3a2a;
            font-weight: 800;
            padding: 0.6rem 1.3rem;
            border-radius: 60px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background: #3a86ff;
            color: white;
        }

        .btn-primary:hover {
            background: #2a6ad0;
            transform: scale(1.02);
        }

        .btn-secondary {
            background: #e67e22;
            color: white;
        }

        .btn-secondary:hover {
            background: #d46a10;
        }

        .btn-reset {
            background: #cc6644;
            color: white;
        }

        .btn-reset:hover {
            background: #aa4422;
        }

        .btn-success {
            background: #44aa66;
            color: white;
        }

        .btn-success:hover {
            background: #338855;
        }

        .results-area {
            margin-top: 1.5rem;
            background: #fff2e0;
            border-radius: 1.2rem;
            padding: 1rem;
            border: 2px solid #ffaa33;
            display: none;
        }

        .results-area h3 {
            color: #cc5500;
            margin-bottom: 0.5rem;
        }

        .result-summary {
            font-size: 1rem;
            margin-bottom: 1rem;
            text-align: center;
            font-weight: bold;
            color: #1f4a2e;
        }

        .result-detail {
            max-height: 260px;
            overflow-y: auto;
            font-size: 0.8rem;
        }

        .result-item {
            padding: 0.4rem;
            border-bottom: 1px solid #ffd9a0;
            display: flex;
            gap: 0.5rem;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 1.2rem;
            color: #aa8855;
        }

        @media (max-width: 550px) {
            .quiz-wrapper {
                padding: 1rem;
            }
            .question-text {
                font-size: 0.98rem;
            }
            .option label {
                font-size: 0.88rem;
            }
            .btn {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-wrapper">
    <div class="header">
        <h1>💾 Almacenamiento y Seguridad</h1>
        <div class="sub">On‑Premise · Cloud · Edge · Híbrida · Zero Trust · Ransomware</div>
    </div>

    <div class="progress-area">
        <span class="question-counter" id="questionCounter">Pregunta 1 / 20</span>
        <span class="score-badge" id="liveScore">✅ Aciertos: 0</span>
    </div>

    <div id="questionContainer"></div>

    <div class="nav-buttons">
        <button id="prevBtn" class="btn btn-secondary">◀ Anterior</button>
        <button id="nextBtn" class="btn btn-primary">Siguiente ▶</button>
        <button id="resetBtn" class="btn btn-reset">⟳ Reiniciar</button>
        <button id="finalScoreBtn" class="btn btn-success">📊 Ver total</button>
    </div>

    <div id="resultsPanel" class="results-area"></div>
    <footer>📌 Selecciona una opción → retroalimentación inmediata. Al finalizar, revisa tu puntuación.</footer>
</div>

<script>
    // ==================== DATOS DEL CUESTIONARIO (20 preguntas) ====================
    // Respuestas correctas extraídas de las justificaciones
    const questionsData = [
        { text: "Una empresa de videovigilancia con cámaras de alta resolución necesita procesar metadatos en tiempo real para activar alarmas sin saturar su enlace de internet de 100 Mbps. ¿Qué arquitectura es la más adecuada para minimizar la latencia y el ancho de banda?",
          options: ["Almacenamiento en la nube (Cloud) con geodistribución.", "Procesamiento en el origen (Edge Computing).", "Servidor físico on-premise con respaldo incremental.", "Nube híbrida con cifrado de extremo a extremo."],
          correct: "b",
          explanation: "Correcta (b): Edge Computing permite procesar datos cerca del dispositivo de origen, reduciendo latencia y ancho de banda."
        },
        { text: "Durante una auditoría financiera, se detecta que el presupuesto de TI fluctúa impredeciblemente debido al crecimiento acelerado de datos. ¿Qué modelo de inversión resolvería la necesidad de adaptabilidad instantánea sin requerir capital inicial (Capex)?",
          options: ["Infraestructura On-premise con escalabilidad física.", "Modelo de suscripción Cloud (Opex).", "Servidor físico con sistemas de refrigeración continua.", "Nube híbrida con control local de datos sensibles."],
          correct: "b",
          explanation: "Correcta (b): El modelo Cloud (Opex) permite pago por uso y adaptabilidad instantánea sin inversión inicial."
        },
        { text: "Un centro de datos local sufre una inundación que daña el 100% de los servidores físicos. Si la empresa no cuenta con copias geodistribuidas, ¿cuál es el riesgo operativo principal según la matriz comparativa?",
          options: ["Obsolescencia tecnológica rápida.", "Alta vulnerabilidad ante desastres físicos.", "Exposición a ataques locales de ransomware.", "Falta de personal técnico especializado."],
          correct: "b",
          explanation: "Correcta (b): On-premise presenta alta vulnerabilidad ante desastres físicos (inundaciones, incendios) sin redundancia externa."
        },
        { text: "Una institución educativa con 1,200 usuarios requiere que los docentes accedan a archivos académicos desde sus hogares y la escuela simultáneamente, garantizando que el sistema no se detenga si falla un disco duro. ¿Qué combinación de servicios es crítica?",
          options: ["Disco duro local y personal de mantenimiento propio.", "Accesibilidad concurrente y sistemas de respaldo/recuperación.", "Virtualización en la nube y organización por carpetas tradicionales.", "Servidor físico con acceso directo offline."],
          correct: "b",
          explanation: "Correcta (b): La accesibilidad concurrente y la recuperación ante fallos son críticas para mantener operatividad."
        },
        { text: "En el contexto de la ciberseguridad actual, un atacante amenaza con filtrar información sensible de una empresa si no se paga un rescate, a pesar de que los datos están respaldados. ¿A qué evolución de amenaza se refiere este escenario?",
          options: ["Ransomware tradicional de cifrado.", "Ataque de denegación de servicio (DDoS).", "Ransomware con extorsión por filtración.", "Fallo predictivo de hardware."],
          correct: "c",
          explanation: "Correcta (c): Evolución del ransomware: no solo cifra, sino que amenaza con filtrar información sensible."
        },
        { text: "Si una organización implementa el modelo 'Nunca confiar, siempre verificar', ¿qué estrategia tecnológica está adoptando para su seguridad perimetral?",
          options: ["Seguridad basada en firewalls físicos únicamente.", "Resiliencia mediante Zero Trust.", "Cifrado de extremo a extremo en la nube.", "Virtualización extrema de servidores."],
          correct: "b",
          explanation: "Correcta (b): Zero Trust reemplaza la seguridad perimetral con 'nunca confiar, siempre verificar'."
        },
        { text: "Un administrador de sistemas nota que sus servidores físicos generan un gasto excesivo en electricidad y espacio. ¿Cuál es el debate actual que propone reducir el consumo energético global?",
          options: ["Implementación de IA para organizar archivos.", "Virtualización en la nube (Green IT).", "Instalación de discos duros de mayor capacidad local.", "Uso de nubes híbridas para datos sensibles."],
          correct: "b",
          explanation: "Correcta (b): Green IT promueve la virtualización en la nube para reducir consumo energético."
        },
        { text: "Una empresa desea migrar a la nube pero teme perder el control total de sus datos más confidenciales (patentes industriales). ¿Qué arquitectura permite mantener el control local de esos datos y usar la nube para el resto?",
          options: ["Procesamiento Edge Computing.", "Infraestructura puramente On-premise.", "Nubes Híbridas.", "Almacenamiento en discos duros locales con sincronización."],
          correct: "c",
          explanation: "Correcta (c): Nubes híbridas permiten mantener datos sensibles localmente y escalar en la nube."
        },
        { text: "Al diseñar un centro de datos de misión crítica que debe operar 24/7/365, ¿cuál de estos componentes es indispensable para la continuidad ante un corte de suministro externo?",
          options: ["Conectividad a internet de alta velocidad.", "Energía eléctrica redundante.", "IA para predicción de fallos de disco.", "Cifrado de extremo a extremo."],
          correct: "b",
          explanation: "Correcta (b): Energía eléctrica redundante y refrigeración son indispensables para continuidad 24/7."
        },
        { text: "Se planea utilizar Inteligencia Artificial en un entorno de almacenamiento masivo. ¿Cuál es el uso técnico más avanzado descrito para mejorar la resiliencia del hardware?",
          options: ["Clasificación semántica de documentos.", "Predicción de fallos en discos duros antes de que ocurran.", "Automatización de copias de seguridad incrementales.", "Cifrado dinámico de carpetas compartidas."],
          correct: "b",
          explanation: "Correcta (b): IA aplicada para predecir fallos en discos duros y minimizar pérdida de datos."
        },
        { text: "Comparando la escalabilidad de un servidor físico vs. la nube, ¿cuál es el diagnóstico técnico del porqué la opción on-premise se considera 'lenta y costosa'?",
          options: ["Por la necesidad de actualizar el software constantemente.", "Por el requerimiento de comprar e instalar nuevos discos físicos y hardware.", "Debido a la falta de protocolos de cifrado de extremo a extremo.", "Porque depende de la conexión a internet para escalar."],
          correct: "b",
          explanation: "Correcta (b): On-premise requiere compra e instalación física de hardware, lo que es lento y costoso."
        },
        { text: "Un usuario pierde la conexión a internet mientras trabaja en un archivo en una plataforma como Google Drive o OneDrive. Según el análisis de software cotidiano, ¿qué sucede técnicamente con el archivo?",
          options: ["El archivo se borra permanentemente del servidor remoto.", "El archivo local no se sincroniza hasta que se recupere la conexión.", "El acceso al archivo queda bloqueado por protocolos Zero Trust.", "Los datos se procesan mediante Edge Computing automáticamente."],
          correct: "b",
          explanation: "Correcta (b): Los cambios offline se guardan localmente y se sincronizan al recuperar la conexión."
        },
        { text: "¿Cuál es la ventaja clave del modelo On-Premise para una planta industrial situada en una zona rural con internet inestable?",
          options: ["Acceso ubicuo desde cualquier dispositivo.", "Operaciones offline y acceso directo a información crítica.", "Actualizaciones continuas gestionadas por el proveedor.", "Reducción del ancho de banda mediante IA."],
          correct: "b",
          explanation: "Correcta (b): On-premise permite operaciones offline sin dependencia de internet, vital en zonas con mala conectividad."
        },
        { text: "En una estrategia de migración digital, ¿por qué se considera que la nube híbrida permite una migración 'sin riesgos'?",
          options: ["Porque elimina la necesidad de personal técnico especializado.", "Porque permite una transición gradual moviendo cargas de trabajo por etapas.", "Porque utiliza IA para predecir errores de migración.", "Porque el costo inicial es cero para toda la infraestructura física."],
          correct: "b",
          explanation: "Correcta (b): Nube híbrida permite migración gradual, manteniendo sistemas críticos bajo control mientras se evalúa la nube."
        },
        { text: "Una empresa sufre un ataque que cifra toda su información local. Si hubieran tenido una arquitectura Cloud, ¿qué característica técnica específica habría mitigado el impacto geográfico del desastre?",
          options: ["El pago por uso (Opex).", "La redundancia geográfica de los centros de datos remotos.", "El uso de sistemas de refrigeración avanzados.", "El procesamiento de datos en el origen."],
          correct: "b",
          explanation: "Correcta (b): Cloud ofrece copias de seguridad geodistribuidas y redundancia física en centros remotos."
        },
        { text: "¿Qué diferencia técnica fundamental existe entre el mantenimiento de un servidor local y uno en la nube?",
          options: ["El local no requiere refrigeración.", "El de la nube es gestionado exclusivamente por el proveedor (Google, AWS, Azure).", "El local ofrece actualizaciones automáticas continuas de hardware.", "El de la nube requiere personal técnico propio físicamente en el data center."],
          correct: "b",
          explanation: "Correcta (b): En Cloud, el mantenimiento y operación son gestionados por el proveedor; on-premise requiere personal propio."
        },
        { text: "Un ingeniero de sistemas debe justificar el uso de 'Cifrado de extremo a extremo'. ¿Cuál es su función principal según el material?",
          options: ["Aumentar la velocidad de transferencia de datos.", "Garantizar la seguridad avanzada de los datos residentes en centros remotos.", "Reducir el consumo energético del servidor físico.", "Facilitar el trabajo remoto y la movilidad."],
          correct: "b",
          explanation: "Correcta (b): El cifrado de extremo a extremo es un protocolo de seguridad avanzada para proteger datos en la nube."
        },
        { text: "En el diseño de una infraestructura para una PyME, se solicita distinguir entre 'Ransomware' y 'Criptografía'. ¿Cuál es la distinción técnica correcta?",
          options: ["La criptografía es un riesgo operativo y el ransomware es una ventaja de seguridad.", "El ransomware es un ataque que puede usar cifrado para extorsionar, mientras que la criptografía es una técnica de protección.", "Ambós términos se refieren a protocolos de redundancia geográfica.", "La criptografía solo se aplica en la nube y el ransomware solo en servidores físicos."],
          correct: "b",
          explanation: "Correcta (b): Ransomware es una amenaza/ataque que puede usar cifrado para extorsionar; criptografía es técnica de protección."
        },
        { text: "Para una aplicación de 'sistemas autónomos' (como drones de entrega), ¿por qué no es viable depender únicamente de 'The Cloud'?",
          options: ["Por los altos costos de Opex.", "Por la latencia en la comunicación que podría causar accidentes.", "Por la falta de seguridad Zero Trust en los drones.", "Por la imposibilidad de cifrar los datos en vuelo."],
          correct: "b",
          explanation: "Correcta (b): Sistemas autónomos requieren Edge Computing por latencia mínima; la nube pura no garantiza tiempo real."
        },
        { text: "Al evaluar la integridad de los datos en un servidor de una escuela, ¿cuál es el mayor 'punto ciego' de un disco duro local comparado con el almacenamiento Cloud?",
          options: ["La dificultad para organizar carpetas semánticamente.", "El exceso de personal técnico especializado.", "La falta de sistemas de respaldo automáticos y geodistribuidos frente a fallos catastróficos.", "La imposibilidad de acceder a los datos sin internet."],
          correct: "c",
          explanation: "Correcta (c): Los servidores locales son vulnerables a fallos catastróficos sin respaldo automático y geodistribuido como el cloud."
        }
    ];

    let userAnswers = new Array(20).fill(null);
    let currentIndex = 0;

    const questionContainer = document.getElementById('questionContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');
    const finalScoreBtn = document.getElementById('finalScoreBtn');
    const questionCounterSpan = document.getElementById('questionCounter');
    const liveScoreSpan = document.getElementById('liveScore');
    const resultsPanel = document.getElementById('resultsPanel');

    function updateLiveScore() {
        let correctCount = 0;
        for (let i = 0; i < userAnswers.length; i++) {
            if (userAnswers[i] && userAnswers[i] === questionsData[i].correct) correctCount++;
        }
        liveScoreSpan.textContent = `✅ Aciertos: ${correctCount} / 20`;
        return correctCount;
    }

    function saveAnswer(selectedLetter) {
        userAnswers[currentIndex] = selectedLetter;
        updateLiveScore();
        renderCurrentQuestion();
    }

    function renderCurrentQuestion() {
        const q = questionsData[currentIndex];
        const selected = userAnswers[currentIndex];
        const letters = ['a', 'b', 'c', 'd'];
        let optionsHtml = '';
        q.options.forEach((opt, idx) => {
            const letter = letters[idx];
            const isChecked = (selected === letter);
            optionsHtml += `
                <div class="option" data-letter="${letter}">
                    <input type="radio" name="question" value="${letter}" id="opt_${letter}" ${isChecked ? 'checked' : ''}>
                    <label for="opt_${letter}"><strong>${letter.toUpperCase()})</strong> ${opt}</label>
                </div>
            `;
        });

        let feedbackHtml = '';
        if (selected) {
            const isCorrect = (selected === q.correct);
            const correctLetter = q.correct;
            const correctText = q.options[letters.indexOf(correctLetter)];
            const explanation = q.explanation;
            if (isCorrect) {
                feedbackHtml = `<div class="feedback correct">✅ <strong>¡Correcto!</strong> ${explanation}</div>`;
            } else {
                feedbackHtml = `<div class="feedback incorrect">❌ <strong>Incorrecto.</strong> La respuesta correcta es ${correctLetter.toUpperCase()}) ${correctText}.<br>${explanation}</div>`;
            }
        } else {
            feedbackHtml = `<div class="feedback" style="border-left-color:#ffcc88; background:#fff5e6;">⚡ Selecciona una opción para ver la retroalimentación.</div>`;
        }

        const html = `
            <div class="question-card">
                <div class="question-text">${q.text}</div>
                <div class="options" id="optionsContainer">
                    ${optionsHtml}
                </div>
                ${feedbackHtml}
            </div>
        `;
        questionContainer.innerHTML = html;

        // Event listeners
        const optionDivs = document.querySelectorAll('.option');
        optionDivs.forEach(div => {
            const radio = div.querySelector('input[type="radio"]');
            const letter = div.getAttribute('data-letter');
            if (radio) {
                radio.addEventListener('change', () => {
                    if (radio.checked) saveAnswer(letter);
                });
            }
            div.addEventListener('click', (e) => {
                if (e.target.tagName !== 'INPUT') {
                    const radioInside = div.querySelector('input');
                    if (radioInside && !radioInside.checked) {
                        radioInside.checked = true;
                        saveAnswer(letter);
                    }
                }
            });
        });

        questionCounterSpan.textContent = `Pregunta ${currentIndex+1} / 20`;
    }

    function showFinalResults() {
        let correctCount = 0;
        let detailsHtml = '';
        for (let i = 0; i < questionsData.length; i++) {
            const q = questionsData[i];
            const userAns = userAnswers[i];
            const isCorrect = (userAns === q.correct);
            if (isCorrect) correctCount++;
            const statusIcon = isCorrect ? '✅' : '❌';
            const userShow = userAns ? userAns.toUpperCase() : '—';
            const correctShow = q.correct.toUpperCase();
            detailsHtml += `
                <div class="result-item">
                    <span style="min-width: 30px;">${statusIcon}</span>
                    <span><strong>Pregunta ${i+1}</strong> (Tu respuesta: ${userShow} / Correcta: ${correctShow})</span>
                </div>
            `;
        }
        const percent = Math.round((correctCount / 20) * 100);
        resultsPanel.innerHTML = `
            <h3>📊 Resultado final</h3>
            <div class="result-summary">🎯 Aciertos: ${correctCount} de 20 (${percent}%)</div>
            <div class="result-detail">${detailsHtml}</div>
            <button id="closeResultsBtn" class="btn btn-secondary" style="margin-top: 10px; width:100%;">✖ Cerrar resumen</button>
        `;
        resultsPanel.style.display = 'block';
        document.getElementById('closeResultsBtn')?.addEventListener('click', () => {
            resultsPanel.style.display = 'none';
        });
        alert(`📊 Cuestionario completado.\nAciertos: ${correctCount} de 20 (${percent}%)\nRevisa el resumen detallado en pantalla.`);
    }

    function nextQuestion() {
        if (currentIndex < 19) {
            currentIndex++;
            renderCurrentQuestion();
        } else {
            const unanswered = userAnswers.filter(a => a === null).length;
            if (unanswered > 0) {
                if (confirm(`Aún tienes ${unanswered} pregunta(s) sin responder. ¿Deseas finalizar de todas formas? Las no respondidas se contarán como incorrectas.`)) {
                    showFinalResults();
                }
            } else {
                showFinalResults();
            }
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCurrentQuestion();
        } else {
            alert("Ya estás en la primera pregunta.");
        }
    }

    function resetQuiz() {
        if (confirm("¿Reiniciar todo el cuestionario? Se perderán todas las respuestas.")) {
            userAnswers = new Array(20).fill(null);
            currentIndex = 0;
            resultsPanel.style.display = 'none';
            updateLiveScore();
            renderCurrentQuestion();
        }
    }

    prevBtn.addEventListener('click', prevQuestion);
    nextBtn.addEventListener('click', nextQuestion);
    resetBtn.addEventListener('click', resetQuiz);
    finalScoreBtn.addEventListener('click', showFinalResults);

    renderCurrentQuestion();
    updateLiveScore();
</script>
</body>
</html>
